name: CI

on: [push, pull_request]

env:
  DISABLE_PANDERA_IMPORT_WARNING: "True"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage (gate: 90%)
        run: |
          pytest tests/ \
            --cov=LedgerFlow \
            --cov-report=term-missing \
            --cov-fail-under=90

      - name: Runtime benchmark (10K rows < 30s)
        run: |
          pytest tests/integration/test_benchmark.py -m benchmark -v

      - name: Check DVC pipeline consistency
        run: |
          dvc repro --dry

  integration-db:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ledgerflow
          POSTGRES_USER: ledgeruser
          POSTGRES_PASSWORD: ledgerpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ledgeruser -d ledgerflow"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      LEDGERFLOW_DB_HOST: localhost
      LEDGERFLOW_DB_PORT: "5432"
      LEDGERFLOW_DB_NAME: ledgerflow
      LEDGERFLOW_DB_USER: ledgeruser
      LEDGERFLOW_DB_PASSWORD: ledgerpass
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run real Postgres integration tests
        run: |
          pytest tests/integration/test_loader.py -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check LedgerFlow/ scripts/

      - name: Mypy type check
        run: mypy LedgerFlow/

  feature-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Validate feature registry & pipeline coverage
        run: |
          python -c "
          from LedgerFlow.registry import validate_registry, FEATURE_REGISTRY
          from LedgerFlow.pipeline import FeaturePipeline

          validate_registry()
          missing = [f for f in FeaturePipeline().feature_names if f not in FEATURE_REGISTRY]
          assert not missing, f'Pipeline features missing from registry: {missing}'
          print(f'OK: {len(FEATURE_REGISTRY)} features registered, all pipeline features present.')
          "
